name: Daily redeploy

# Triggers a fresh Vercel deployment once a day (and on demand).
# Setup: in Vercel, create a Deploy Hook (Project → Settings → Git → Deploy Hooks),
# then add its URL as a repository secret named VERCEL_DEPLOY_HOOK_URL.

on:
  schedule:
    - cron: "0 12 * * *" # every day at 12:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Triggering Vercel deploy hook..."
          curl -fsSL -X POST "$HOOK"
          echo "Done."
